# Secret gate — DEPLOY-02 / 08-02 (D-04).
# Runs the EXTENDED scripts/verify.py credential_audit gate (exit 20) on every push and
# pull_request, on a REAL web/ build so the client-bundle grep (Check b) is meaningful in CI
# rather than skipped. A leaked credential fails this job and blocks the merge BEFORE Vercel
# ever builds (belt-and-suspenders for a graded PUBLIC repo).
#
# This is a FOCUSED invocation (mirrors `make verify-uc` / `make secret-gate`): it imports
# gate_credential_audit + EXIT_OK + EXIT_CREDENTIAL_LEAK and exits the gate's code — it does
# NOT run the full 0..21 ladder (the cloud-touching gates need creds this job deliberately has
# none of). The workflow needs NO repo secrets.
name: secret-gate

on:
  push:
  pull_request:

jobs:
  credential-gate:
    name: credential_audit (NEXT_PUBLIC + client-bundle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Build web/ so web/.next/static EXISTS — this makes credential_audit Check (b)
      # (client-bundle secret grep) a REAL check in CI instead of the skip-path it takes
      # on a clean checkout. prebuild copies ../sql,../aql,../data/golden first.
      - name: Build web/ client bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      # Minimal install: the credential gate is offline (git ls-files + file reads) and has
      # no cloud deps. `pip install -e .` makes `scripts.verify` importable.
      - name: Install Python package
        run: pip install -e .

      # Focused invocation of ONLY the credential gate (mirrors make secret-gate / verify-uc).
      # Exits 20 (EXIT_CREDENTIAL_LEAK) on a leak -> non-zero -> job fails -> merge blocked.
      - name: Run credential_audit gate
        run: |
          python -c "import sys; from scripts.verify import gate_credential_audit, EXIT_OK, EXIT_CREDENTIAL_LEAK; sys.exit(EXIT_OK if gate_credential_audit() else EXIT_CREDENTIAL_LEAK)"
